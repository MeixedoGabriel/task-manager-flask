<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login - Task Manager</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='auth.css') }}"
    >

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>Task Manager</h1>

            <p class="subtitle">
                Entre na sua conta
            </p>

            {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">

                <input
                    type="text"
                    name="username"
                    placeholder="Usuário"
                    required
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Senha"
                    required
                >

                <button type="submit">
                    Entrar
                </button>

            </form>

            <p class="switch-page">

                Não possui conta?

                <a href="/register">
                    Criar conta
                </a>

            </p>

        </div>

    </div>

</body>

</html>
